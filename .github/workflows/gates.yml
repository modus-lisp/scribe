name: gates
on: [push, pull_request]
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl
      - name: Offline gate suite
        run: sh inspect/run-all.sh
